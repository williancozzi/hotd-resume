<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of the Dragon - Resumo (T1 & T2)</title>
<style>
  :root{
    --ink:#1c1714; --paper:#f4e9d2; --gold:#e0a92a; --fire:#f0641e;
    --green:#2f7a4d; --blood:#9e2b25; --silver:#d8d8de; --sky:#aee0f2;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    background:radial-gradient(circle at 50% -10%,#2a2018,#120d09 70%);
    color:#f4e9d2; height:100vh; height:100dvh; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    padding:12px 16px;
  }
  .wrap{width:100%; max-width:clamp(300px, calc((100dvh - 460px) * 1.74), 860px); height:100vh; height:100dvh; margin:0 auto; display:flex; flex-direction:column; justify-content:center;}
  header{text-align:center; margin-bottom:10px; flex:none;}
  header h1{font-size:26px; letter-spacing:.5px; color:var(--gold); text-shadow:0 2px 0 #000;}
  header p{font-size:13px; color:#c9b48b; margin-top:2px;}
  .tv{
    background:#0c0906; border:6px solid #2a2018; border-radius:18px;
    box-shadow:0 18px 50px rgba(0,0,0,.6), inset 0 0 0 2px #3a2c1d;
    overflow:hidden; position:relative; flex:none;
  }
  .stage{position:relative; width:100%; aspect-ratio:800/460; background:#000;}
  .scene{
    position:absolute; inset:0; opacity:0; transform:scale(1.04);
    transition:opacity .5s ease, transform .5s ease;
    display:flex; align-items:center; justify-content:center;
  }
  .scene.active{opacity:1; transform:scale(1);}
  .scene svg{width:100%; height:100%; display:block;}
  .cap{
    background:linear-gradient(180deg,#1a130c,#0c0906);
    border-top:3px solid var(--gold); padding:14px 20px 16px; height:140px; overflow-y:auto; flex:none;
  }
  .cap .ep{font-size:11px; letter-spacing:2px; color:var(--fire); text-transform:uppercase; font-weight:bold;}
  .cap h2{font-size:19px; color:var(--gold); margin:2px 0 6px;}
  .cap p{font-size:14.5px; line-height:1.5; color:#ecdfc4;}
  .controls{
    display:flex; align-items:center; gap:10px; margin-top:14px; justify-content:center; flex-wrap:wrap;
  }
  button{
    font-family:inherit; font-weight:bold; cursor:pointer; color:#1c1714;
    background:linear-gradient(180deg,#f0d27a,#d9a426); border:2px solid #7a5712;
    border-radius:10px; padding:9px 16px; font-size:14px; box-shadow:0 3px 0 #5c4210;
    transition:transform .08s;
  }
  button:active{transform:translateY(2px); box-shadow:0 1px 0 #5c4210;}
  button.ghost{background:#241a10; color:#e9d3a0; border-color:#5c4210; box-shadow:0 3px 0 #000;}
  .counter{font-size:13px; color:#c9b48b; min-width:54px; text-align:center;}
  .dots{display:flex; gap:6px; justify-content:center; margin-top:12px; flex-wrap:wrap;}
  .dot{width:11px; height:11px; border-radius:50%; background:#3a2c1d; border:1px solid #5c4210; cursor:pointer; padding:0; box-shadow:none;}
  .dot.on{background:var(--gold); box-shadow:0 0 8px var(--gold);}
  .bar{height:5px; background:#2a2018; border-radius:3px; overflow:hidden; margin-top:10px;}
  .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--fire),var(--gold)); transition:width .12s linear;}
  .hint{text-align:center; font-size:11.5px; color:#9d8a66; margin-top:8px;}
  footer{text-align:center; font-size:9.5px; color:#6f5f44; margin-top:22px;}
  footer b{color:var(--gold); font-weight:bold;}
  .topbar{display:flex; align-items:center; gap:10px; padding:8px 14px; background:#160f08; border-bottom:2px solid var(--gold);}
  .topbar .ib{background:#241a10; color:#e9d3a0; border:2px solid #5c4210; border-radius:8px; padding:5px 11px; font-size:16px; cursor:pointer; box-shadow:0 2px 0 #000;}
  .topbar .ib:active{transform:translateY(1px);}
  .topbar .vlabel{font-size:11px; letter-spacing:2px; color:#c9b48b; font-weight:bold;}
  .topbar input[type=range]{flex:1; max-width:220px; accent-color:var(--gold); cursor:pointer;}
  .intro{position:absolute; inset:0; z-index:20; background:radial-gradient(circle at 50% 34%,#1d150d,#070402 75%); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:18px; overflow:auto;}
  .intro.hide{display:none;}
  .introArt{width:390px; max-width:78%; line-height:0; margin-bottom:16px; transform:translateY(-8px);}
  .introTitle{font-size:30px; color:var(--gold); letter-spacing:2px; text-shadow:0 2px 0 #000; margin:4px 0 0;}
  .introSub{font-size:12px; color:#c9b48b; letter-spacing:4px; text-transform:uppercase; margin:4px 0 0;}
  .introMsg{font-size:16px; color:#ecdfc4; max-width:460px; margin:16px 0 0; line-height:1.5;}
  .bigplay{margin-top:18px; font-size:18px; padding:13px 32px;}
  .introDisc{font-size:10.5px; color:#6f5f44; margin-top:18px; max-width:430px; line-height:1.4;}
  @media (max-width:600px){
    body{align-items:center; padding:12px 10px;}
    header h1{font-size:21px;}
    header p{font-size:12px;}
    .tv{border-width:4px; border-radius:12px;}
    .topbar{padding:6px 10px; gap:8px;}
    .topbar input[type=range]{max-width:none;}
    .cap{padding:12px 14px 12px; height:150px; overflow-y:auto;}
    .cap .ep{font-size:11px; letter-spacing:1.5px;}
    .cap h2{font-size:18px;}
    .cap p{font-size:15.5px; line-height:1.55;}
    .controls{gap:8px; margin-top:14px;}
    button{padding:11px 17px; font-size:15px;}
    .counter{font-size:13px;}
    .dots{gap:8px; margin-top:16px;}
    .dot{width:14px; height:14px;}
    .hint{font-size:12.5px; margin-top:12px;}
    .intro{overflow:auto; padding:14px;}
    .introArt{width:220px; max-width:62%; margin-bottom:12px; transform:translateY(-4px);}
    .introTitle{font-size:23px; letter-spacing:1px;}
    .introSub{font-size:11px; letter-spacing:2px;}
    .introMsg{font-size:14px; margin-top:12px;}
    .bigplay{font-size:17px; padding:12px 26px; margin-top:14px;}
    .introDisc{font-size:9.5px; margin-top:12px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🐉 House of the Dragon - O Resumo</h1>
    <p>Temporadas 1 &amp; 2</p>
  </header>

  <div class="tv">
    <div class="intro" id="intro">
      <div class="introArt" id="introArt"></div>
      <p class="introSub">O Resumo · Temporadas 1 &amp; 2</p>
      <p class="introMsg">E aí, vamos recapitular o que rolou até agora em House of the Dragon?</p>
      <button class="bigplay" id="startBtn">▶ Começar</button>
    </div>
    <div class="topbar">
      <button class="ib" id="muteBtn" aria-label="Ligar/desligar som">🔊</button>
      <span class="vlabel">VOLUME</span>
      <input type="range" id="vol" min="0" max="100" value="55" aria-label="Volume">
    </div>
    <div class="stage" id="stage"></div>
    <div class="cap">
      <div class="ep" id="ep"></div>
      <h2 id="title"></h2>
      <p id="text"></p>
    </div>
  </div>

  <audio id="themeAudio" loop preload="auto">
    <source src="theme.mp3" type="audio/mpeg">
  </audio>

  <div id="belowControls" style="display:none;">
    <div class="bar"><i id="prog"></i></div>

    <div class="controls">
      <button class="ghost" id="prev">⟵ Anterior</button>
      <button id="play">⏸ Pausar</button>
      <button class="ghost" id="next">Próximo ⟶</button>
      <span class="counter" id="counter"></span>
    </div>
    <div class="dots" id="dots"></div>

    <p class="hint">clique nas bolinhas pra pular · cada cena ~30s</p>
    <footer>2026 - made with ❤️ by <b>Tchu</b></footer>
  </div>
</div>

<script>
/* ---------- helpers de desenho cartoon ---------- */
const NS="http://www.w3.org/2000/svg";

// rostinho cartoon reutilizável (olhos esbugalhados)
function face(cx,cy,r,skin,mood){
  // mood: 'happy','sad','angry','shock','smug','dead'
  let mouth="";
  if(mood==='happy') mouth=`<path d="M${cx-r*0.45} ${cy+r*0.25} Q ${cx} ${cy+r*0.7} ${cx+r*0.45} ${cy+r*0.25}" stroke="#5b2b16" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  else if(mood==='sad') mouth=`<path d="M${cx-r*0.4} ${cy+r*0.55} Q ${cx} ${cy+r*0.2} ${cx+r*0.4} ${cy+r*0.55}" stroke="#5b2b16" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  else if(mood==='angry') mouth=`<path d="M${cx-r*0.4} ${cy+r*0.5} L ${cx+r*0.4} ${cy+r*0.4}" stroke="#5b2b16" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  else if(mood==='shock') mouth=`<ellipse cx="${cx}" cy="${cy+r*0.45}" rx="${r*0.22}" ry="${r*0.3}" fill="#5b2b16"/>`;
  else if(mood==='smug') mouth=`<path d="M${cx-r*0.1} ${cy+r*0.45} Q ${cx+r*0.35} ${cy+r*0.55} ${cx+r*0.5} ${cy+r*0.25}" stroke="#5b2b16" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  else if(mood==='dead') mouth=`<path d="M${cx-r*0.35} ${cy+r*0.5} L ${cx+r*0.35} ${cy+r*0.5}" stroke="#5b2b16" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  let eyes;
  if(mood==='dead'){
    eyes=`<path d="M${cx-r*0.55} ${cy-r*0.25} l 18 18 M ${cx-r*0.55+18} ${cy-r*0.25} l -18 18" stroke="#1c1714" stroke-width="3.5"/>
          <path d="M${cx+r*0.2} ${cy-r*0.25} l 18 18 M ${cx+r*0.2+18} ${cy-r*0.25} l -18 18" stroke="#1c1714" stroke-width="3.5"/>`;
  } else if(mood==='angry'){
    eyes=`<circle cx="${cx-r*0.4}" cy="${cy-r*0.1}" r="${r*0.18}" fill="#fff" stroke="#1c1714" stroke-width="2.5"/>
          <circle cx="${cx-r*0.4}" cy="${cy-r*0.05}" r="${r*0.09}" fill="#1c1714"/>
          <circle cx="${cx+r*0.4}" cy="${cy-r*0.1}" r="${r*0.18}" fill="#fff" stroke="#1c1714" stroke-width="2.5"/>
          <circle cx="${cx+r*0.4}" cy="${cy-r*0.05}" r="${r*0.09}" fill="#1c1714"/>
          <path d="M${cx-r*0.62} ${cy-r*0.42} l ${r*0.45} ${r*0.18}" stroke="#1c1714" stroke-width="4" stroke-linecap="round"/>
          <path d="M${cx+r*0.62} ${cy-r*0.42} l ${-r*0.45} ${r*0.18}" stroke="#1c1714" stroke-width="4" stroke-linecap="round"/>`;
  } else {
    const pyl = mood==='shock'? -r*0.18 : 0;
    eyes=`<circle cx="${cx-r*0.4}" cy="${cy-r*0.1}" r="${r*0.2}" fill="#fff" stroke="#1c1714" stroke-width="2.5"/>
          <circle cx="${cx-r*0.4}" cy="${cy-r*0.1+0.1*r+pyl}" r="${r*0.09}" fill="#1c1714"/>
          <circle cx="${cx+r*0.4}" cy="${cy-r*0.1}" r="${r*0.2}" fill="#fff" stroke="#1c1714" stroke-width="2.5"/>
          <circle cx="${cx+r*0.4}" cy="${cy-r*0.1+0.1*r+pyl}" r="${r*0.09}" fill="#1c1714"/>`;
  }
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${skin}" stroke="#1c1714" stroke-width="3"/>${eyes}${mouth}`;
}
// cabelo loiro Targaryen (calota)
function silverHair(cx,cy,r){
  return `<path d="M${cx-r-3} ${cy} Q ${cx-r} ${cy-r-12} ${cx} ${cy-r-14} Q ${cx+r} ${cy-r-12} ${cx+r+3} ${cy} Q ${cx+r*0.7} ${cy-r*0.5} ${cx} ${cy-r*0.55} Q ${cx-r*0.7} ${cy-r*0.5} ${cx-r-3} ${cy} Z" fill="#f0d873" stroke="#1c1714" stroke-width="3"/>`;
}
// cabelo escuro (Strong)
function darkHair(cx,cy,r){
  return `<path d="M${cx-r-3} ${cy} Q ${cx-r} ${cy-r-12} ${cx} ${cy-r-14} Q ${cx+r} ${cy-r-12} ${cx+r+3} ${cy} Q ${cx+r*0.7} ${cy-r*0.5} ${cx} ${cy-r*0.55} Q ${cx-r*0.7} ${cy-r*0.5} ${cx-r-3} ${cy} Z" fill="#3b2b1f" stroke="#1c1714" stroke-width="3"/>`;
}
// coroa
function crown(cx,cy,w){
  const h=w*0.55;
  return `<path d="M${cx-w/2} ${cy} L ${cx-w/2} ${cy-h} L ${cx-w/4} ${cy-h*0.4} L ${cx} ${cy-h*1.1} L ${cx+w/4} ${cy-h*0.4} L ${cx+w/2} ${cy-h} L ${cx+w/2} ${cy} Z" fill="#e0a92a" stroke="#7a5712" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="${cx}" cy="${cy-h*0.7}" r="4" fill="#9e2b25" stroke="#7a5712" stroke-width="1.5"/>`;
}
// dragão cartoon (dir = 1 olha p/ direita)
function dragon(x,y,s,color,dir,fire){
  const f = dir||1;
  const fireSvg = fire? `<g transform="translate(${x+f*s*140},${y+s*30})">
      <path d="M0 0 L ${f*70*s} ${-14*s} L ${f*40*s} 0 L ${f*78*s} ${10*s} L ${f*42*s} ${10*s} L ${f*70*s} ${24*s} L 0 ${14*s} Z" fill="#f0641e" stroke="#9e2b25" stroke-width="2"/>
      <path d="M${f*8*s} ${3*s} L ${f*52*s} ${-4*s} L ${f*30*s} ${6*s} L ${f*54*s} ${14*s} L ${f*10*s} ${11*s} Z" fill="#ffd24a"/>
    </g>`:'';
  return `<g transform="translate(${x},${y}) scale(${f*s},${s})">
    <path d="M22 16 Q -8 -62 -50 -80 Q -38 -56 -42 -40 Q -60 -56 -78 -48 Q -56 -38 -52 -22 Q -70 -28 -84 -14 Q -50 -8 -20 2 Q 0 8 24 18 Z" fill="${color}" stroke="#1c1714" stroke-width="3" stroke-linejoin="round"/>
    <path d="M18 12 Q -12 -34 -50 -78 M12 10 Q -38 -22 -78 -48 M6 10 Q -40 -8 -84 -14" stroke="#1c1714" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M-28 52 C -82 56 -122 58 -146 49 Q -162 42 -157 30 Q -151 41 -139 47 C -116 58 -82 66 -28 64 Z" fill="${color}" stroke="#1c1714" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="20" cy="40" rx="70" ry="42" fill="${color}" stroke="#1c1714" stroke-width="3"/>
    <path d="M70 30 Q 120 0 150 30 Q 120 25 100 45 Q 130 55 120 80 Q 100 55 75 55 Z" fill="${color}" stroke="#1c1714" stroke-width="3"/>
    <circle cx="105" cy="20" r="6" fill="#fff" stroke="#1c1714" stroke-width="2"/>
    <circle cx="106" cy="22" r="3" fill="#1c1714"/>
    <path d="M120 36 q 12 2 18 0" stroke="#1c1714" stroke-width="2.5" fill="none"/>
  </g>${fireSvg}`;
}
function bg(c1,c2){
  return `<rect width="800" height="460" fill="${c1}"/><rect y="300" width="800" height="160" fill="${c2}"/>`;
}
// Trono de Ferro (cadeira de espadas) - cx = centro, sy = altura do assento
function throne(cx,sy){
  const top=sy-24;
  const blade=(dx,h,tilt)=>{const bx=cx+dx,ty=top-h,tx=bx+tilt;return `<path d="M${bx-8} ${top} L${tx} ${ty} L${bx+8} ${top} Z" fill="#7c7c87" stroke="#1c1714" stroke-width="2" stroke-linejoin="round"/><path d="M${bx-2} ${top} L${tx} ${ty}" stroke="#b6b6bf" stroke-width="1.5"/>`;};
  let bl='';
  [[-70,90,-20],[-46,128,-10],[-18,158,-3],[16,156,4],[44,126,11],[70,88,20]].forEach(b=>bl+=blade(b[0],b[1],b[2]));
  return `${bl}<path d="M${cx-82} ${sy+158} L${cx-78} ${top} L${cx+78} ${top} L${cx+82} ${sy+158} Z" fill="#43434c" stroke="#1c1714" stroke-width="3"/><rect x="${cx-58}" y="${sy}" width="116" height="22" fill="#5a5a64" stroke="#1c1714" stroke-width="2.5"/><path d="M${cx-78} ${sy+34} L${cx-112} ${sy-10} L${cx-70} ${sy+12} Z" fill="#7c7c87" stroke="#1c1714" stroke-width="2"/><path d="M${cx+78} ${sy+34} L${cx+112} ${sy-10} L${cx+70} ${sy+12} Z" fill="#7c7c87" stroke="#1c1714" stroke-width="2"/><rect x="${cx-92}" y="${sy+158}" width="184" height="18" rx="3" fill="#2c2c33" stroke="#1c1714" stroke-width="3"/>`;
}

/* ---------- as cenas ---------- */
const scenes = [
{ ep:"Temporada 1 · O estopim", title:"A escolha que estragou tudo",
  text:"Rei Viserys, sem filho homem, aponta pra filha Rhaenyra: «você é minha herdeira!». Os lordes juram lealdade de cara amarrada. Spoiler: ninguém ia respeitar isso.",
  svg:`${bg('#f0d9a8','#c8a86a')}
    ${throne(195,205)}
    ${face(195,160,34,'#f3c89a','smug')}${silverHair(195,160,34)}${crown(195,128,46)}
    <rect x="170" y="200" width="50" height="120" rx="8" fill="#9e2b25" stroke="#1c1714" stroke-width="3"/>
    <path d="M218 250 L 360 260" stroke="#1c1714" stroke-width="5" stroke-linecap="round" marker-end="url(#tip)"/>
    ${face(420,250,30,'#f3c89a','happy')}${silverHair(420,250,30)}
    <rect x="395" y="285" width="50" height="80" rx="8" fill="#3a4f7a" stroke="#1c1714" stroke-width="3"/>
    <text x="420" y="345" font-size="13" text-anchor="middle" fill="#fff" font-weight="bold">Rhaenyra</text>
    ${face(560,300,26,'#e8b98a','angry')}${face(630,300,26,'#d9a978','angry')}${face(700,300,26,'#e8b98a','angry')}
    <text x="630" y="365" font-size="13" text-anchor="middle" fill="#5b2b16" font-weight="bold">lordes (de saco cheio)</text>` },

{ ep:"Temporada 1 · Traição da amizade", title:"A melhor amiga vira... madrasta",
  text:"Otto Hightower empurra a filha Alicent pro rei viúvo. Rhaenyra: «ué, amiga?». Nasce Aegon II. Grupo de WhatsApp da amizade: encerrado.",
  svg:`${bg('#e7d3b0','#bfa470')}
    ${face(230,210,34,'#f3c89a','happy')}${silverHair(230,210,34)}${crown(230,178,44)}
    <path d="M270 230 L 360 240" stroke="#9e2b25" stroke-width="5" stroke-linecap="round"/>
    <text x="315" y="218" font-size="22" text-anchor="middle">💍</text>
    ${face(420,210,32,'#f6d2a8','smug')}
    <path d="M386 210 Q 388 175 420 172 Q 452 175 454 210 Q 420 196 386 210Z" fill="#2f7a4d" stroke="#1c1714" stroke-width="3"/>
    <rect x="392" y="246" width="56" height="90" rx="8" fill="#2f7a4d" stroke="#1c1714" stroke-width="3"/>
    <text x="420" y="356" font-size="13" text-anchor="middle" fill="#143a26" font-weight="bold">Alicent</text>
    ${face(620,250,30,'#f3c89a','sad')}${silverHair(620,250,30)}
    <text x="620" y="320" font-size="13" text-anchor="middle" fill="#5b2b16" font-weight="bold">Rhaenyra: «sério?»</text>
    <text x="560" y="120" font-size="46">💔</text>` },

{ ep:"Temporada 1 · 10 anos depois", title:"Os filhos misteriosamente morenos",
  text:"Rhaenyra casa com Laenor, mas os meninos têm cabelão escuro igual ao Sor Harwin. Todo mundo finge que não percebeu. A Alicent? Printou tudo.",
  svg:`${bg('#f0d9a8','#c8a86a')}
    ${face(180,180,32,'#f3c89a','happy')}${silverHair(180,180,32)}
    <text x="180" y="250" font-size="13" text-anchor="middle" fill="#5b2b16" font-weight="bold">Rhaenyra (loira)</text>
    ${face(180,330,26,'#f0c69a','happy')}${darkHair(180,330,26)}
    ${face(260,330,26,'#e8bd8e','happy')}${darkHair(260,330,26)}
    ${face(340,330,26,'#f0c69a','happy')}${darkHair(340,330,26)}
    <text x="260" y="395" font-size="13" text-anchor="middle" fill="#5b2b16" font-weight="bold">os filhos (curiosamente morenos)</text>
    ${face(560,180,30,'#d9a978','smug')}${darkHair(560,180,30)}
    <rect x="535" y="215" width="50" height="90" rx="8" fill="#5b3a22" stroke="#1c1714" stroke-width="3"/>
    <text x="560" y="135" font-size="13" text-anchor="middle" fill="#5b2b16" font-weight="bold">Sor Harwin 👀</text>
    <line x1="350" y1="320" x2="520" y2="220" stroke="#9e2b25" stroke-width="3" stroke-dasharray="8 6"/>
    <text x="690" y="150" font-size="40">📸</text>` },

{ ep:"Temporada 1 · Pirraça com asas", title:"Aemond rouba o maior dragão",
  text:"O menino Aemond pega Vhagar (dragão tamanho família). Na briga, o priminho Luke corta o olho dele. Aemond ganha tapa-olho e um rancor eterno de brinde.",
  svg:`${bg('#cfe7f2','#8fb8c8')}
    ${dragon(540,210,1.4,'#3b6b4a',1,false)}
    <text x="560" y="120" font-size="14" text-anchor="middle" fill="#143a26" font-weight="bold">Vhagar (gigante)</text>

/* ---------- montagem + player ---------- */
const stage=document.getElementById('stage');
const dotsBox=document.getElementById('dots');
const defs=`<defs><marker id="tip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#1c1714" stroke-width="2"/></marker></defs>`;

scenes.forEach((sc,i)=>{
  const div=document.createElement('div');
  div.className='scene';
  div.innerHTML=`<svg viewBox="0 0 800 460" xmlns="${NS}" role="img" aria-label="${sc.title}">${defs}${sc.svg}</svg>`;
  stage.appendChild(div);
  const d=document.createElement('button');
  d.className='dot'; d.title=sc.title;
  d.onclick=()=>{ go(i); pause(); };
  dotsBox.appendChild(d);
});

let cur=0, playing=true, t0=null, raf=null;
const DUR=30000;
const epEl=document.getElementById('ep'), titleEl=document.getElementById('title'),
  textEl=document.getElementById('text'), counter=document.getElementById('counter'),
  prog=document.getElementById('prog'), playBtn=document.getElementById('play');

function render(){
  [...stage.children].forEach((c,i)=>c.classList.toggle('active',i===cur));
  [...dotsBox.children].forEach((c,i)=>c.classList.toggle('on',i===cur));
  epEl.textContent=scenes[cur].ep;
  titleEl.textContent=scenes[cur].title;
  textEl.textContent=scenes[cur].text;
  counter.textContent=`${cur+1} / ${scenes.length}`;
}
function go(i){ cur=(i+scenes.length)%scenes.length; t0=null; render(); }
function tick(ts){
  if(!playing) return;
  if(t0===null) t0=ts;
  const e=ts-t0;
  prog.style.width=Math.min(100,(e/DUR)*100)+'%';
  if(e>=DUR){
    if(cur < scenes.length-1){ go(cur+1); }
    else { prog.style.width='100%'; pause(); return; }
  }
  raf=requestAnimationFrame(tick);
}
function play(){ playing=true; playBtn.textContent='⏸ Pausar'; t0=null; cancelAnimationFrame(raf); raf=requestAnimationFrame(tick); resumeMusic(); }
function pause(){ playing=false; playBtn.textContent='▶ Tocar'; cancelAnimationFrame(raf); pauseMusic(); }

document.getElementById('next').onclick=()=>{ go(cur+1); if(playing)play(); };
document.getElementById('prev').onclick=()=>{ go(cur-1); if(playing)play(); };
playBtn.onclick=()=>{ playing?pause():play(); };
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){go(cur+1); if(playing)play();}
  if(e.key==='ArrowLeft'){go(cur-1); if(playing)play();}
  if(e.key===' '){e.preventDefault(); playing?pause():play();}
});

/* ---------- música ---------- */
const audioEl=document.getElementById('themeAudio');
const muteBtn=document.getElementById('muteBtn');
const volSlider=document.getElementById('vol');
let musicOn=true, mp3Failed=false, audioCtx=null, lookahead=null, masterGain=null, reverbNode=null, curVol=0.55, muted=false, started=false;

// se nao houver theme.mp3 (ex.: rodando local sem o arquivo), cai pra trilha sintetizada
audioEl.addEventListener('error',()=>{ mp3Failed=true; });

// trilha original sintetizada - épica/sombria, clima GOT (sem copyright)
const A=220;                          // Lá de referência
const hz=n=>A*Math.pow(2,n/12);       // semitom -> frequência
// progressão em Lá menor: Am - F - C - G  (i - VI - III - VII)
const CHORDS=[ [0,3,7], [-4,0,5], [3,7,12], [-2,2,7] ];
// melodia de cello - 8 colcheias por compasso (semitons rel. ao Lá, +1 oitava); null = silêncio
const MEL=[
  [12,null,7,null,12,15,14,12],
  [12,null,8,null,15,17,15,12],
  [19,null,15,null,12,15,19,17],
  [14,null,10,7,null,7,5,7],
];
let bar=0, nextBarTime=0;
const BARLEN=2.0;                     // duração do compasso (s) - andamento lento/épico

function makeReverb(ctx){
  const len=Math.floor(ctx.sampleRate*2.4), buf=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6); }
  const c=ctx.createConvolver(); c.buffer=buf; return c;
}
function voice(freq,t,dur,o){
  o=o||{};
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain(), f=audioCtx.createBiquadFilter();
  osc.type=o.type||'sawtooth'; osc.frequency.value=freq; osc.detune.value=o.detune||0;
  f.type='lowpass'; f.frequency.value=o.cut||1200; f.Q.value=0.6;
  const vol=o.vol||0.1, atk=o.attack||0.04;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.setValueAtTime(vol,t+dur*0.55);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.connect(f); f.connect(g); g.connect(masterGain); g.connect(reverbNode);
  osc.start(t); osc.stop(t+dur+0.1);
}
function scheduleBar(t){
  const ch=CHORDS[bar%CHORDS.length];
  // pad de cordas (duas serras detuned por nota = som encorpado)
  ch.forEach(s=>{
    voice(hz(s),t,BARLEN,{type:'sawtooth',vol:0.04,cut:780,attack:0.6,detune:-7});
    voice(hz(s),t,BARLEN,{type:'sawtooth',vol:0.04,cut:780,attack:0.6,detune:7});
  });
  // baixo grave (oitava abaixo da fundamental)
  voice(hz(ch[0]-12),t,BARLEN,{type:'triangle',vol:0.18,cut:480,attack:0.02});
  voice(hz(ch[0]-12),t,BARLEN,{type:'sine',vol:0.12,cut:380,attack:0.02});
  // melodia de cello
  const mel=MEL[bar%MEL.length], step=BARLEN/8;
  mel.forEach((m,i)=>{ if(m===null) return;
    voice(hz(m+12),t+i*step,step*1.7,{type:'sawtooth',vol:0.09,cut:1500,attack:0.03});
  });
  bar++;
}
function startSynth(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=muted?0:curVol;
  reverbNode=makeReverb(audioCtx);
  const revGain=audioCtx.createGain(); revGain.gain.value=0.4;
  const comp=audioCtx.createDynamicsCompressor();
  reverbNode.connect(revGain); revGain.connect(comp);
  masterGain.connect(comp); comp.connect(audioCtx.destination);
  bar=0; nextBarTime=audioCtx.currentTime+0.15;
  lookahead=setInterval(()=>{
    while(nextBarTime < audioCtx.currentTime+0.6){ scheduleBar(nextBarTime); nextBarTime+=BARLEN; }
  },130);
}
function stopSynth(){ if(lookahead){clearInterval(lookahead); lookahead=null;} if(audioCtx){audioCtx.close(); audioCtx=null;} }

function applyVol(){ const v=muted?0:curVol; if(masterGain) masterGain.gain.value=v; audioEl.volume=v; }
function refreshIcon(){ muteBtn.textContent=(muted||curVol===0||!musicOn)?'🔇':'🔊'; }

// inicia o áudio (mp3 real se existir; senão a trilha sintetizada)
function beginAudio(){
  if(started || !musicOn) return;
  if(!mp3Failed){
    audioEl.volume=muted?0:curVol;
    const p=audioEl.play();
    if(p&&p.then) p.then(()=>{ started=true; }).catch(()=>{});  // bloqueado: espera 1º gesto
  }
  if(mp3Failed && !audioCtx){ startSynth(); started=true; }
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  refreshIcon();
}
function pauseMusic(){ if(!started) return; audioEl.pause(); if(audioCtx && audioCtx.state==='running') audioCtx.suspend(); }
function resumeMusic(){ if(!started || !musicOn) return; if(!mp3Failed) audioEl.play().catch(()=>{}); if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }

muteBtn.onclick=()=>{
  if(!musicOn){ musicOn=true; started=false; beginAudio(); }
  else { muted=!muted; }
  applyVol(); refreshIcon();
};
volSlider.oninput=()=>{
  curVol=volSlider.value/100;
  if(curVol>0){ muted=false; if(!musicOn){ musicOn=true; started=false; } beginAudio(); }
  applyVol(); refreshIcon();
};

// a música começa quando a pessoa clica em "Começar" (gesto exigido pelo navegador)

const intro=document.getElementById('intro');
const introArt=document.getElementById('introArt');
const introDragonSvg=`<svg viewBox="0 0 420 240" xmlns="${NS}" role="img" aria-label="Dragão">${defs}<g transform="translate(30,20) scale(0.85)">${dragon(190,130,1,'#e0a92a',1,true)}</g></svg>`;
const introImg=document.createElement('img');
introImg.src='dragao.png'; introImg.alt='Dragão';
introImg.style.cssText='width:100%;height:auto;image-rendering:pixelated;';
introImg.onerror=()=>{ introArt.innerHTML=introDragonSvg; };
introArt.appendChild(introImg);
function startShow(){
  intro.classList.add('hide');
  document.getElementById('belowControls').style.display='';
  musicOn=true; started=false; beginAudio();
  cur=0; render(); play();
}
document.getElementById('startBtn').onclick=startShow;

render();
</script>
</body>
</html>
